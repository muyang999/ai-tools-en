<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Title Generator — Free Online Tool</title>
  <meta name="description" content="Generate 10 catchy, SEO-friendly titles from any keyword or topic. Free AI-powered title generator — no sign-up required." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa; color: #1f2937; line-height: 1.6; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .container { max-width: 780px; margin: 0 auto; padding: 0 20px; width: 100%; flex: 1; }
    header { text-align: center; padding: 40px 0 8px; }
    header a { color: #2563eb; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 2rem; color: #2563eb; font-weight: 800; letter-spacing: -0.3px; margin-top: 4px; }
    header p { color: #6b7280; margin-top: 4px; font-size: 0.95rem; }
    .card { background: #fff; border-radius: 16px; padding: 32px; margin: 24px 0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    label { display: block; font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; color: #374151; }
    textarea {
      width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; border-radius: 10px;
      font-size: 1rem; font-family: inherit; resize: vertical; transition: border-color .2s;
      background: #fafafa; min-height: 100px;
    }
    textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); background: #fff; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #2563eb; color: #fff; border: none; padding: 12px 32px;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .1s; margin-top: 16px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: transparent; color: #2563eb; border: 1.5px solid #2563eb; padding: 8px 20px;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background .2s; margin-top: 0;
    }
    .btn-outline:hover { background: #eff6ff; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .toolbar h2 { font-size: 1.1rem; color: #1f2937; font-weight: 700; }
    .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .result-list { list-style: none; counter-reset: item; }
    .result-list li {
      counter-increment: item; padding: 12px 16px; margin-bottom: 8px;
      background: #f9fafb; border-radius: 8px; border-left: 3px solid #2563eb;
      font-size: 0.95rem; display: flex; align-items: flex-start; gap: 10px;
    }
    .result-list li::before {
      content: counter(item); background: #2563eb; color: #fff; font-size: 0.75rem;
      font-weight: 700; width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .empty-state { text-align: center; color: #9ca3af; padding: 40px 0; font-size: 0.95rem; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .error-msg { background: #fef2f2; color: #b91c1c; padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; display: none; }
    .ad-placeholder { background: #e5e7eb; border-radius: 8px; padding: 20px; text-align: center; color: #9ca3af; font-size: 0.85rem; margin: 24px 0; max-width: 728px; margin-left: auto; margin-right: auto; }
    footer { text-align: center; padding: 24px 0 40px; color: #9ca3af; font-size: 0.85rem; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; padding: 10px 24px; border-radius: 8px;
      font-size: 0.9rem; opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .card { padding: 20px; margin: 16px 0; }
      .btn { width: 100%; justify-content: center; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .btn-outline { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html">← Back to Home</a>
      <h1>🏷️ AI Title Generator</h1>
      <p>Enter a keyword or topic, and we'll generate 10 catchy, SEO-friendly titles for you.</p>
    </header>

    <div class="card">
      <label for="input-text">What is your topic or keyword?</label>
      <textarea id="input-text" placeholder="e.g. Remote work productivity tips, Vegan chocolate recipes, AI in healthcare..."></textarea>

      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <button class="btn" id="generate-btn">✨ Generate Titles</button>
        <div class="spinner" id="spinner"></div>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="card" id="results-card" style="display:none;">
      <div class="toolbar">
        <h2>📋 Generated Titles</h2>
        <button class="btn-outline" id="copy-btn">📄 Copy All</button>
      </div>
      <ol class="result-list" id="result-list"></ol>
    </div>

    <div class="card" id="empty-card">
      <div class="empty-state">
        <div class="icon">🏷️</div>
        <p>Enter a topic above and click "Generate Titles" to get started.</p>
      </div>
    </div>

    <div class="ad-placeholder">📢 AdSense Ad Unit (728×90)</div>
  </div>

  <footer>&copy; 2025 AI Tools. All rights reserved.</footer>
  <div class="toast" id="toast"></div>

  <script>
    const API_URL = "https://ai-tool-api.278750417.workers.dev/api/";

    const inputEl = document.getElementById("input-text");
    const generateBtn = document.getElementById("generate-btn");
    const spinner = document.getElementById("spinner");
    const resultsCard = document.getElementById("results-card");
    const emptyCard = document.getElementById("empty-card");
    const resultList = document.getElementById("result-list");
    const copyBtn = document.getElementById("copy-btn");
    const errorMsg = document.getElementById("error-msg");
    const toast = document.getElementById("toast");

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function setLoading(loading) {
      generateBtn.disabled = loading;
      generateBtn.classList.toggle("loading", loading);
      spinner.style.display = loading ? "block" : "none";
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    function hideError() {
      errorMsg.style.display = "none";
    }

    async function generateTitles() {
      const text = inputEl.value.trim();
      if (!text) {
        showError("Please enter a topic or keyword.");
        inputEl.focus();
        return;
      }
      hideError();
      setLoading(true);
      resultsCard.style.display = "none";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "xiaohongshu", text, style: "" })
        });

        if (!res.ok) {
          const errText = await res.text().catch(() => "");
          throw new Error(`Server error (${res.status})${errText ? ": " + errText : ""}`);
        }

        const data = await res.json();
        let titles = [];

        if (Array.isArray(data)) {
          titles = data;
        } else if (data.titles && Array.isArray(data.titles)) {
          titles = data.titles;
        } else if (data.result && Array.isArray(data.result)) {
          titles = data.result;
        } else if (data.data && Array.isArray(data.data)) {
          titles = data.data;
        } else if (typeof data === "string") {
          titles = data.split("\n").filter(t => t.trim());
        } else if (data.text) {
          titles = data.text.split("\n").filter(t => t.trim());
        } else {
          // try to find any array in the response
          for (const key in data) {
            if (Array.isArray(data[key])) {
              titles = data[key];
              break;
            }
          }
        }

        if (titles.length === 0) {
          throw new Error("No titles returned. Try a different topic.");
        }

        renderResults(titles);
      } catch (err) {
        showError(err.message);
        setLoading(false);
      }
    }

    function renderResults(titles) {
      resultList.innerHTML = "";
      titles.forEach(title => {
        const li = document.createElement("li");
        li.textContent = title;
        resultList.appendChild(li);
      });
      resultsCard.style.display = "block";
      emptyCard.style.display = "none";
      setLoading(false);
    }

    copyBtn.addEventListener("click", () => {
      const items = resultList.querySelectorAll("li");
      const text = Array.from(items).map(li => li.textContent).join("\n");
      navigator.clipboard.writeText(text).then(() => {
        showToast("Copied " + items.length + " titles!");
      }).catch(() => {
        // fallback
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showToast("Copied " + items.length + " titles!");
      });
    });

    generateBtn.addEventListener("click", generateTitles);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        generateTitles();
      }
    });
  </script>
</body>
</html>
