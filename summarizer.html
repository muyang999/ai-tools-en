<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Summarizer — Free Online Tool</title>
  <meta name="description" content="Paste a long article and get a concise 3–5 sentence summary. Free AI-powered text summarizer." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa; color: #1f2937; line-height: 1.6; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .container { max-width: 780px; margin: 0 auto; padding: 0 20px; width: 100%; flex: 1; }
    header { text-align: center; padding: 40px 0 8px; }
    header a { color: #2563eb; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 2rem; color: #2563eb; font-weight: 800; letter-spacing: -0.3px; margin-top: 4px; }
    header p { color: #6b7280; margin-top: 4px; font-size: 0.95rem; }
    .card { background: #fff; border-radius: 16px; padding: 32px; margin: 24px 0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    label { display: block; font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; color: #374151; }
    textarea {
      width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; border-radius: 10px;
      font-size: 1rem; font-family: inherit; resize: vertical; transition: border-color .2s;
      background: #fafafa; min-height: 180px;
    }
    textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); background: #fff; }
    .char-count { text-align: right; font-size: 0.8rem; color: #9ca3af; margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #2563eb; color: #fff; border: none; padding: 12px 32px;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .1s; margin-top: 16px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: transparent; color: #2563eb; border: 1.5px solid #2563eb; padding: 8px 20px;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background .2s; margin-top: 0;
    }
    .btn-outline:hover { background: #eff6ff; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .toolbar h2 { font-size: 1.1rem; color: #1f2937; font-weight: 700; }
    .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid #bfdbfe; border-top-color: #2563eb; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .result-box {
      padding: 16px; background: #f9fafb; border-radius: 8px; border-left: 3px solid #2563eb;
      font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap;
    }
    .empty-state { text-align: center; color: #9ca3af; padding: 40px 0; font-size: 0.95rem; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .error-msg { background: #fef2f2; color: #b91c1c; padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 0.9rem; display: none; }
    .ad-placeholder { background: #e5e7eb; border-radius: 8px; padding: 20px; text-align: center; color: #9ca3af; font-size: 0.85rem; margin: 24px 0; max-width: 728px; margin-left: auto; margin-right: auto; }
    footer { text-align: center; padding: 24px 0 40px; color: #9ca3af; font-size: 0.85rem; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; padding: 10px 24px; border-radius: 8px;
      font-size: 0.9rem; opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .card { padding: 20px; margin: 16px 0; }
      .btn { width: 100%; justify-content: center; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .btn-outline { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html">← Back to Home</a>
      <h1>📄 AI Summarizer</h1>
      <p>Paste a long article, blog post, or document and get a concise 3–5 sentence summary.</p>
    </header>

    <div class="card">
      <label for="input-text">Paste your text here</label>
      <textarea id="input-text" placeholder="Paste the article, blog post, or document you want to summarize..."></textarea>
      <div class="char-count"><span id="char-count">0</span> characters</div>

      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <button class="btn" id="summarize-btn">✨ Summarize</button>
        <div class="spinner" id="spinner"></div>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="card" id="results-card" style="display:none;">
      <div class="toolbar">
        <h2>📋 Summary</h2>
        <button class="btn-outline" id="copy-btn">📄 Copy All</button>
      </div>
      <div class="result-box" id="result-box"></div>
    </div>

    <div class="card" id="empty-card">
      <div class="empty-state">
        <div class="icon">📄</div>
        <p>Paste a long text above and click "Summarize" to get a concise summary.</p>
      </div>
    </div>

    <div class="ad-placeholder">📢 AdSense Ad Unit (728×90)</div>
  </div>

  <footer>&copy; 2025 AI Tools. All rights reserved.</footer>
  <div class="toast" id="toast"></div>

  <script>
    const API_URL = "https://ai-tool-api.278750417.workers.dev/api/";

    const inputEl = document.getElementById("input-text");
    const summarizeBtn = document.getElementById("summarize-btn");
    const spinner = document.getElementById("spinner");
    const resultsCard = document.getElementById("results-card");
    const emptyCard = document.getElementById("empty-card");
    const resultBox = document.getElementById("result-box");
    const copyBtn = document.getElementById("copy-btn");
    const errorMsg = document.getElementById("error-msg");
    const charCountEl = document.getElementById("char-count");
    const toast = document.getElementById("toast");

    inputEl.addEventListener("input", () => {
      charCountEl.textContent = inputEl.value.length;
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function setLoading(loading) {
      summarizeBtn.disabled = loading;
      summarizeBtn.classList.toggle("loading", loading);
      spinner.style.display = loading ? "block" : "none";
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    function hideError() {
      errorMsg.style.display = "none";
    }

    async function summarizeText() {
      const text = inputEl.value.trim();
      if (!text) {
        showError("Please paste some text to summarize.");
        inputEl.focus();
        return;
      }
      if (text.length < 50) {
        showError("Please enter at least 50 characters for a meaningful summary.");
        inputEl.focus();
        return;
      }
      hideError();
      setLoading(true);
      resultsCard.style.display = "none";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "summary", text, style: "" })
        });

        if (!res.ok) {
          const errText = await res.text().catch(() => "");
          throw new Error(`Server error (${res.status})${errText ? ": " + errText : ""}`);
        }

        const data = await res.json();
        let summary = "";

        if (typeof data === "string") {
          summary = data;
        } else if (data.summary) {
          summary = data.summary;
        } else if (data.result) {
          summary = data.result;
        } else if (data.text) {
          summary = data.text;
        } else if (data.summarized) {
          summary = data.summarized;
        } else if (data.data && typeof data.data === "string") {
          summary = data.data;
        } else if (Array.isArray(data)) {
          summary = data.map(s => "- " + s).join("\n");
        } else {
          for (const key in data) {
            if (typeof data[key] === "string" && data[key].length > 20) {
              summary = data[key];
              break;
            }
          }
        }

        if (!summary) {
          throw new Error("No summary returned. Please try again.");
        }

        renderResults(summary);
      } catch (err) {
        showError(err.message);
        setLoading(false);
      }
    }

    function renderResults(text) {
      resultBox.textContent = text;
      resultsCard.style.display = "block";
      emptyCard.style.display = "none";
      setLoading(false);
    }

    copyBtn.addEventListener("click", () => {
      const text = resultBox.textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast("Copied to clipboard!");
      }).catch(() => {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showToast("Copied to clipboard!");
      });
    });

    summarizeBtn.addEventListener("click", summarizeText);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.ctrlKey) {
        e.preventDefault();
        summarizeText();
      }
    });
  </script>
</body>
</html>
